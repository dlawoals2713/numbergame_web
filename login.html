<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - 숫자 기억력 게임</title>
    
    <link rel="stylesheet" href="style/login.css">  <!--css파일 연결-->
</head>
<body>
    <header>
        <h1>🧠 숫자 기억력 게임</h1>
        <a href="index.html">← 홈으로</a>
    </header>

    <nav>
        <a href="index.html">홈</a>
        <a href="login.html" class="active">로그인</a>
        <a href="register.html">회원가입</a>
        <a href="game.html">게임 시작</a>
        <a href="about.html">소개</a>
    </nav>

    <div class="login-wrap">
        <h2>로그인</h2>

        <div class="field">
            <label for="user-id">아이디*</label>
            <input type="text" id="user-id" placeholder="아이디를 입력하세요">
            <span class="error" id="err-loginId"></span>
        </div>
        
        <div class="field">
            <label for="user-pw">비밀번호*</label>
            <input type="password" id="user-pw" placeholder="비밀번호를 입력하세요">
            <span class="error" id="err-loginPw"></span>
        </div>

        <div class="options">
            <label><input type="checkbox" id="save-id"> 아이디 저장</label>
        </div>

        <div class="captcha-box">
            <input type="checkbox" id="not-robot">
            <label for="not-robot">로봇이 아닙니다.</label>
            <div class="captcha-logo">reCAPTCHA<br><span style="font-size:0.6rem;">개인정보 · 약관</span></div>
        </div>
        <span class="error" id="err-captcha" style="margin-bottom:10px;"></span>

        <button type="button" class="btn-login" id="loginBtn">로그인</button>

        <div class="links">
            <a href="#" onclick="alert('준비 중인 기능입니다.')">아이디 찾기</a> &nbsp;|&nbsp;
            <a href="#" onclick="alert('준비 중인 기능입니다.')">비밀번호 찾기</a>
        </div>

        <div class="signup-link">
            아직 계정이 없으신가요? <a href="register.html">회원가입 하기 →</a>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 숫자 기억력 게임. All rights reserved.</p>
    </footer>


    <script src="script/login.js"></script>     <!--자바스크립트 파일 연결-->
</body>
</html>
