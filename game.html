<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>게임 플레이 - 숫자 기억력 게임</title>
    
    <link rel="stylesheet" href="style/game.css">     <!--css파일 연결-->
</head>
<body>

    <header>
        <h1>🧠 숫자 기억력 게임</h1>
        <div id="authArea">
            <span style="color:#aaa;">불러오는 중...</span>
        </div>
    </header>

    <nav>
        <a href="index.html">홈</a>
        <a href="game.html" class="active">게임 시작</a>
        <a href="about.html">소개</a>
    </nav>

    <div class="container">
        <main>
            <div class="status-panel">
                <div id="lblLevel">현재 레벨: 1</div>
                <div id="lblHighScore">최고기록: Lv.0</div>
            </div>

            <div class="game-board" id="gameScreen">READY</div>

            <div class="control-box">
                <input type="text" id="userInput" placeholder="숫자를 입력하세요" disabled>
                <button class="btn-action" id="gameBtn">게임 시작</button>
            </div>
        </main>
    </div>

    <footer>
        <p>&copy; 2026 숫자 기억력 게임. All rights reserved.</p>
    </footer>

    <script src="script/game.js"></script>      <!--자바스크립트 파일 연결-->
</body>
</html>
