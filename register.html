<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 - 숫자 기억력 게임</title>
    
    <link rel="stylesheet" href="style/register.css">     <!--css파일 연결-->
</head>
<body>
    <header>
        <h1>🧠 숫자 기억력 게임</h1>
        <a href="index.html">← 홈으로</a>
    </header>

    <nav>
        <a href="index.html">홈</a>
        <a href="login.html">로그인</a>
        <a href="register.html" class="active">회원가입</a>
        <a href="game.html">게임 시작</a>
        <a href="about.html">소개</a>
    </nav>

    <div class="signup-wrap">
        <h2>회원가입</h2>

        <div class="field">
            <label for="userId">아이디*</label>
            <input type="text" id="userId" placeholder="4자 이상 입력하세요">
            <span class="error" id="err-userId"></span>  <!--오류 메시지-->
        </div>

        <div class="field">
            <label for="userPw">비밀번호*</label>
            <input type="password" id="userPw" placeholder="6자 이상 입력하세요">
            <span class="error" id="err-userPw"></span>
        </div>

        <div class="field">
            <label for="userPwChk">비밀번호 확인*</label>
            <input type="password" id="userPwChk" placeholder="비밀번호를 한번 더 입력하세요">
            <span class="error" id="err-userPwChk"></span>
        </div>

        <div class="field">
            <label for="userName">이름*</label>
            <input type="text" id="userName" placeholder="이름을 입력하세요">
            <span class="error" id="err-userName"></span>
        </div>

        <div class="field">
            <label>이메일*</label>
            <div class="email-row">
                <input type="text" id="emailLocal" placeholder="이메일 아이디">
                <span>@</span>
                <input type="text" id="emailDomainTxt" style="display:none;" placeholder="도메인 입력">
                <select id="emailDomain">
                    <option value="선택하기">선택하기</option>
                    <option value="naver.com">naver.com</option>
                    <option value="gmail.com">gmail.com</option>
                    <option value="hanmail.net">hanmail.net</option>
                    <option value="직접 입력">직접 입력</option>
                </select>
            </div>
            <span class="error" id="err-email"></span>
        </div>

        <div class="field">
            <label for="userPhone">휴대폰*</label>
            <input type="text" id="userPhone" placeholder="숫자만 입력 (예: 01012345678)">
            <span class="error" id="err-userPhone"></span>
        </div>

        <div class="field">
            <label>성별</label>
            <div class="gender-row">
                <input type="radio" name="gender" value="m" id="genderM" checked>
                <label for="genderM">남자</label>
                
                <input type="radio" name="gender" value="f" id="genderF">
                <label for="genderF">여자</label>
                
                <input type="radio" name="gender" value="none" id="genderNone">
                <label for="genderNone">선택안함</label>
            </div>
        </div>

        <div class="agree-section">
            <h3>이용약관 동의*</h3>
            <div class="agree-all">
                <input type="checkbox" id="agreeAll">
                <label for="agreeAll">전체 동의합니다.</label>
            </div>
            <p class="agree-note">선택항목에 동의하지 않은 경우도 가입이 가능합니다.</p>

            <div class="agree-item">
                <input type="checkbox" id="agree1">
                <label for="agree1">이용약관 동의 (필수)</label>
                <a href="#" onclick="alert('\'내용\'')">내용보기</a>
            </div>
            <div class="agree-item">
                <input type="checkbox" id="agree2">
                <label for="agree2">개인정보 수집∙이용 동의 (필수)</label>
                <a href="#" onclick="alert('\'내용\'')">내용보기</a>
            </div>
            <div class="agree-item">
                <input type="checkbox" id="agree3">
                <label for="agree3">마케팅 활용 동의 (선택)</label>
                <a href="#" onclick="alert('\'내용\'')">내용보기</a>
            </div>
            <div class="agree-item">
                <input type="checkbox" id="agree5">
                <label for="agree5">본인은 만 14세 이상입니다. (필수)</label>
            </div>
        </div>
        <span class="error" id="err-agree"></span>

        <button type="button" id="submitBtn" class="btn-submit">가입하기</button>

        <div class="login-link">
            이미 계정이 있으신가요? <a href="login.html">로그인 하기 →</a>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 숫자 기억력 게임. All rights reserved.</p>   <!--바닥글에 저작권 정보 추가-->
    </footer>

    <script src="script/register.js"></script>      <!--자바스크립트 파일 연결-->
</body>
</html>
